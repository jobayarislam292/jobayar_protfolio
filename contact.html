<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Md. Jobayar Islam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Times New Roman", Times, serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Top Bar Navigation */
        .header {
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo-small {
            border: 2px solid red;
            padding: 8px 15px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        nav {
            display: flex;
            gap: 3rem;
        }

        .nav-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1rem;
            text-transform: capitalize;
            letter-spacing: 1px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            background: none;
            border: none;
        }

        .nav-link:hover {
            text-transform: uppercase;
            color: #38bdf8;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -3px;
            left: 0;
            background-color: #38bdf8;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Contact Content */
        .container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            margin-bottom: 40px;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .contact-methods {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .contact-link {
            font-size: 1.5rem;
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #333;
            padding: 20px 40px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-link:hover {
            border-color: #38bdf8;
            color: #38bdf8;
            background-color: rgba(56, 189, 248, 0.05);
            transform: translateY(-3px);
        }

        .email-address {
            display: block;
            margin-top: 10px;
            font-size: 1rem;
            color: #94a3b8;
            text-transform: lowercase;
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }
            nav { gap: 1.5rem; }
            h1 { font-size: 2rem; }
            .contact-link { font-size: 1.2rem; padding: 15px 30px; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-small">JOBAYAR'S PORTFOLIO</div>
        <nav>
            <a href="index" class="nav-link">Home</a>
            <a href="about" class="nav-link">About me</a>
        </nav>
    </header>

    <main class="container">
        <h1>GET IN TOUCH</h1>
        
        <div class="contact-methods">
            <a href="mailto:25203139@iubat.edu" class="contact-link">
                Send an Email
                <span class="email-address">25203139@iubat.edu</span>
            </a>

            <a href="https://www.linkedin.com/in/your-profile-here" target="_blank" class="contact-link">
                LinkedIn Profile
            </a>
        </div>

        <p style="margin-top: 50px; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; font-size: 0.9rem;">
            Available for collaborations and technical projects.
        </p>
    </main>

</body>
</html>
