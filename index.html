<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobayar's Portfolio</title>
    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Global Font: Times New Roman */
            font-family: "Times New Roman", Times, serif;
        }

        body {
            background-color: #000000; /* Deep black background */
            color: #ffffff; /* White text for contrast */
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Responsive Top-Left Logo */
        .logo-banner {
            position: absolute;
            top: 20px;
            left: 20px;
            border: 2px solid red; /* Prominent red border from photos */
            padding: 10px 20px;
            z-index: 20;
            opacity: 0;
            animation: fadeInScale 0.8s forwards 0.2s;
        }

        .logo-text {
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* Navigation Menu at top-right */
        nav {
            display: flex;
            justify-content: flex-end;
            gap: 2rem;
            padding: 30px 40px;
            z-index: 10;
        }

        .nav-link {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: none;
            border: none;
            position: relative;
            text-transform: capitalize;
            letter-spacing: 1px;
            display: inline-block;
        }

        /* Hover Effect: Uppercase and Underline in Blue */
        .nav-link:hover {
            text-transform: uppercase;
            color: #38bdf8; /* Only place other color is used */
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -3px;
            left: 0;
            background-color: #38bdf8;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        /* Circular Profile Section */
        .profile-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .profile-pic {
            width: 220px;
            height: 220px;
            border-radius: 50%; /* Perfect circle */
            overflow: hidden;
            opacity: 0;
            animation: fadeInScale 1s forwards;
            border: 2px solid #333;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Hero Content Area */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px 20px 80px 20px; /* Space for the name */
        }

        /* NEW STYLE FOR THE NAME: Based on image_2.png */
        h1 {
            font-size: 2.5rem;
            line-height: 1.2; /* Tighter line height for stacked text */
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s forwards 0.4s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold; /* Based on the image */
        }

        /* Subtitle Styling */
        .subtitle {
            color: #94a3b8; /* Subtle gray subtitle */
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-top: 15px;
            opacity: 0;
            animation: fadeIn 1s forwards 0.8s;
            text-transform: uppercase;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .logo-banner {
                position: relative;
                top: 0;
                left: 0;
                margin: 20px auto;
                display: inline-block;
                width: fit-content;
            }
            
            nav {
                justify-content: center;
                padding: 10px;
                gap: 1.5rem;
            }

            .nav-link { font-size: 1rem; }

            h1 { font-size: 1.8rem; } /* Shrink for mobile */
            .subtitle { font-size: 0.9rem; }
            
            .profile-pic { width: 180px; height: 180px; }
            .logo-text { font-size: 1rem; }
        }

        /* Sub-sections (About, Contact) */
        .content-section {
            display: none;
            padding: 80px 20px;
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }

        .active {
            display: block;
            animation: fadeIn 0.6s ease-in;
        }

        h2 {
            font-size: 2.2rem;
            text-transform: uppercase;
            font-weight: normal;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            display: inline-block;
            padding-bottom: 10px;
        }

        p {
            line-height: 1.7;
            font-size: 1.15rem;
            color: #cbd5e1;
            margin-bottom: 15px;
        }

        /* Animations */
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .back-btn {
            margin-top: 50px;
            display: inline-block;
            color: #ffffff; /* White like the name */
            cursor: pointer;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 1px;
            font-weight: bold;
            padding: 10px 20px;
            border: 1px solid white;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            color: #000000;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="logo-banner" id="logo-banner">
        <span class="logo-text">JOBAYAR'S PORTFOLIO</span>
    </div>

    <nav id="top-nav">
        <a href="about" class="nav-link">About me</a>
        <a href="contact" class="nav-link">Contact</a>
    </nav>

    <div class="profile-container" id="profile-container">
        <div class="profile-pic">
            <img src="IMG_1224.jpg" alt="Md. Jobayar Islam">
        </div>
    </div>

    <section class="hero" id="home">
        <h1>I'm<br>MD JOBAYAR ISLAM</h1>
        <p class="subtitle">Computer Science Student & Content Writer</p>
    </section>

    <script>
        function showSection(sectionId) {
            const home = document.getElementById('home');
            const profile = document.getElementById('profile-container');
            const logo = document.getElementById('logo-banner');
            const sections = document.querySelectorAll('.content-section');

            // Hide the main hero content
            home.style.display = 'none';
            profile.style.display = 'none';
            logo.style.display = 'none';

            sections.forEach(s => s.classList.remove('active'));

            if (sectionId === 'home') {
                home.style.display = 'flex';
                profile.style.display = 'flex';
                logo.style.display = 'block';
            } else {
                document.getElementById(sectionId).classList.add('active');
            }
        }
    </script>
</body>
</html>
